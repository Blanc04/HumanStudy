<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOX Shelter Visit</title>
    <style>
        h1 {
            font-style: monospace;
            text-align: center;
            color: orange;
        }
        h1::before {
            content: "🦊";
        }
        h1::after {
            content: "🦊";
        }
        .parent {
            width: 500px;
            margin: auto;
            padding: 8px;
            text-align: center;
            border: 2px solid orange;
            border-radius: 16%;
            box-sizing: border-box;
        }
        #scedule {
            margin: auto;
        }
    </style>
</head>
<body>
    <h1 id="title">FOX Shelter Visit</h1>
    <div class="parent">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSoywV3cUV6u8pwSlNLJ0qEeqSK0oiPmb9LD7fJ0Z7OZg&s" alt="fox" width="300px">
        <p>Welcome to the fox shelter.</p>
        <ul>
            <li>Do not scare foxes.</li>
            <li>Do not feed random food.</li>
            <li>Be quiet.</li>
        </ul>
        <table id="scedule">
            <tbody>
                <tr>
                   <th>
                    Open
                   </th> 
                   <td>
                    10:00
                   </td> 
                </tr>
                <tr>
                    <th>
                    Close
                    </th>
                    <td>
                    18:00
                    </td>
                </tr>
                <tr>
                    <th>
                    Notice
                    </th>
                    <td>
                    Fox is Cute
                    </td>
                </tr>
            </tbody>
        </table>
        <form action="https://www.google.com/search" method="get" target="_blank">
            <input type="text" name="q" placeholder="검색할 여우 입력">
        </form>
    </div>
</body>
</html>
