        let money = 0
        let menu = -1
        let menu1 = -1
        let menu2 = -1
        while(menu != 0){
            // 메뉴
            menu = prompt("1:입금, 2:출금, 3:잔액보기, 0:종료")
            // 입금 메뉴
            if(menu == 1){
                menu1 = Number(prompt('얼마를 입금하시겠습니까? (0 누르면 뒤로 감.)'))
                // 오 드디어 if 안에 if를 넣을 수 있다는 걸 알았어
                if(menu1 > 0){
                    money += menu1
                    // 정신병 1
                    alert(`${menu1}원 입금되었습니다. 잔액에 ${menu1}원이 추가되었습니다.`)
                    console.log(`${menu1}원 입금되었습니다.`)
                } else{
                    alert('잔액을 다시 입력해주세요.')
                    console.log('잔액을 다시 입력해주세요.')
                }
            }
            // 출금 메뉴
            if(menu == 2){
                menu2 = Number(prompt('얼마를 출금하시겠습니까? (원 제외하고 입력)'))
                if(money > menu2){
                    money -= menu2
                // 정신병 2
                alert(`${menu2}원 출금되었습니다. 잔액에 ${menu2}원이 차감되었습니다.`)
                console.log(`${menu2}원 출금되었습니다.`)
            } else{
                alert('잔액이 부족합니다.')
                console.log('잔액이 부족합니다.')
                }
            }
            // 잔액 확인
            if(menu == 3){
                alert(`현재 잔액은 ${money}원 입니다.`)
            }
            // Get off.
            if(menu == 0){
                alert(`꺼져.`)
            }
        }

                // 오 그래 if를 쓰면 되는 구나
                // 양쪽 끝이 맞을 떄만 +를 추가하면 되
                if(j==1 || j==4 || pl==1 || pl ==4) {
                string += p
            } else {
                string += u
            }
