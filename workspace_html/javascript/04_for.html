<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for</title>
    <script>
        /*
            for( 초기화식; 조건식; 증감식 )

            1. 초기화 식 실행 (맨 처음에 딱 한 번만 실행, 스킵 가능)
            2. 조건식이 거짓이 아니면 (스킵 가능)
            3. 실행 블럭을 실행
            4. 증감식 실행 (스킵 가능)
            5. "2."번의 조건식으로 가서 false일 때 까지 반복
        */
        for(let i=1; i<=50; i++){
            console.log(i)
        }
        
        let a = 1
        let sum = 0
        sum ++
        sum += 2
        sum += 3
        sum += 4
        sum += 5
        console.log(sum)

        sum = 0
        for(let i=1; i<=5; i++){
            sum= sum + i
            console.log(sum)
        }

        // 문제 1
        for(let j=5; j>=1; j--){
            console.log(j)
        }

        // 문제 2
        j = 1
        for(let i=1; i<=5; i++){
            if (j = i % 2){
                console.log(`${i}홀`)
            } else {
                console.log(`${i}짝`)
            }
        }

        // 문제 3
        let count = 0
        for(let i=1; i<=10; i++){
            if (i % 2 == 1)
            count++
        }
        console.log(`홀의 개수: ${count}개`)

        /*
            반복문 만드는 원리

            1. 반복 되는 것 찾기
               - ctrl c, v 했을 떄 바뀌지 않는 것 찾기

            2. 반복 되지 않는 것의 규칙(패턴) 찾기

            3. 규칙을 변수로 바꿔서 ctrl c/v 해도 되게 바꾸기

            4. 시작 값 파악

            5. 종료 조건 파악
        */

        // 구구단
        // 2 x 1 =2
        // 2 x 2 =4
        let c = 1
        console.log(`2 x ${c} = ${c*2}`)
        c = 2
        console.log(`2 x ${c} = ${c*2}`)

        // 2단
        // for(let i=1; i<=9; i++){
        //     console.log(`2 x ${i} = ${i*2}`)
        // }
        
        // 3단
        // let d = 3
        // for(let i=1; i<=9; i++){
        //     console.log(`${d} x ${i} = ${i*d}`)
        // }

        // 9x9
        for(let j=2; j<=9; j++){
            for(let i=1; i<=9; i++){
                console.log(`${j} x ${i} = ${i*j}`)
            }
        }

        // 3
        // 주사위 하나의 모든 경우의 수를 출력
        for(let q3=1; q3<=6; q3++){
            console.log(`${q3}`)
        }
        
        // 4
        // 주사위 2개의 모든 경우의 수를 출력
        // 예: [1, 2] [2, 1]
        for(let q4d1=1; q4d1<=6; q4d1++){
            for(let q4d2=1; q4d2<=6; q4d2++){
                console.log(`[${q4d1}, ${q4d2}]`)
            }
        }
        
        // 5
        // 주사위 2개로 나올 수 있는 합 별 조합
        // 예
        /*
        합 2 : [1, 1]
        합 3 : [1, 2] [2, 1]
        합 4 : [1, 3] [2, 2] [3, 1]
        */
        for(let sum=2; sum<=12; sum++){
            console.log(`합 ${sum} 조합`)
            for(let q5d1=1; q5d1<=6; q5d1++){
                for(let q5d2=1; q5d2<=6; q5d2++){
                    if(q5d1 + q5d2 == sum){
                    console.log(`[${q5d1}, ${q5d2}]`)
                    }
                }
            }
        }

        // 주사위 2개의 합은 최소 1+1=2, 최대 6+6=12까지 가능함
        // 그래서 sum을 2부터 12까지 하나씩 증가시키면서 확인함
        for(let sum = 2; sum <= 12; sum++){

            // 현재 찾고 있는 합이 몇인지 출력
            // 예: 합 2 조합, 합 3 조합 ...
            console.log(`합 ${sum} 조합`)

            // 첫 번째 주사위 값
            // 주사위는 1부터 6까지 나오니까 q5d1도 1~6까지 반복
            for(let q5d1 = 1; q5d1 <= 6; q5d1++){

                // 두 번째 주사위 값
                // 이것도 주사위니까 1~6까지 반복
                for(let q5d2 = 1; q5d2 <= 6; q5d2++){

                    // 첫 번째 주사위 + 두 번째 주사위가
                    // 현재 찾고 있는 sum과 같으면 조합으로 인정
                    if(q5d1 + q5d2 == sum){

                        // 조건에 맞는 주사위 조합 출력
                        // 예: [1, 1], [1, 2], [2, 1]
                        console.log(`[${q5d1}, ${q5d2}]`)
                    }
                }
            }
        }
    </script>
</head>

</body>
</html>
