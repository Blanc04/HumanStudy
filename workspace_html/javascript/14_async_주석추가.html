<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>async</title>
    <script>
        /*
            이 파일의 핵심 주제
            --------------------------------------------------
            1. 일반 함수는 위에서 아래로 순서대로 실행된다. (동기 처리)
            2. 함수를 호출하면 해당 함수의 내부 코드가 먼저 실행된다.
            3. setTimeout()의 콜백 함수는 바로 실행되지 않고 예약된다.
            4. 현재 실행 중인 모든 동기 코드가 끝난 다음,
               예약된 setTimeout 콜백이 실행된다. (비동기 처리)

            예상 콘솔 출력 순서
            --------------------------------------------------
            fn1 실행
            fn2 실행
            fn3 실행
            fn3 실행
            1
            마지막
            2
            3
        */


        // fn1이라는 이름의 함수를 선언한다.
        function fn1(){
            // fn1이 실제로 실행되었는지 확인하기 위한 출력이다.
            console.log('fn1 실행')

            /*
                fn2 함수를 호출한다.

                fn1의 실행이 끝나기 전에 fn2 안으로 들어가며,
                fn2의 모든 코드가 끝나야 다시 fn1로 돌아온다.
            */
            fn2()
        }


        // fn2라는 이름의 함수를 선언한다.
        function fn2(){
            // fn2가 실행되었음을 콘솔에 출력한다.
            console.log('fn2 실행')

            /*
                fn3 함수를 첫 번째로 호출한다.

                fn3 내부 코드가 모두 실행된 다음
                다시 이 위치의 다음 줄로 돌아온다.
            */
            fn3()

            // fn3 함수를 두 번째로 호출한다.
            fn3()


            /*
                일반 console.log()는 동기 코드이므로
                현재 줄에서 즉시 실행된다.
            */
            console.log('1')


            /*
                setTimeout(콜백 함수, 지연 시간)

                첫 번째 전달인자:
                나중에 실행할 함수, 즉 콜백 함수

                두 번째 전달인자:
                콜백 실행을 요청하기 전 기다릴 최소 시간(ms)

                0ms를 지정해도 콜백이 현재 위치에서 즉시 실행되는 것은 아니다.

                아래 콜백 함수는 일단 예약되고,
                현재 실행 중인 fn2와 나머지 동기 코드가 모두 끝난 후 실행된다.
            */
            setTimeout(function(){
                console.log('2')
            }, 0)


            /*
                이 코드를 주석 해제하면 동기 코드이므로
                예약된 '2'보다 먼저 출력된다.

                console.log('3')
            */
            // console.log('3')


            /*
                두 번째 setTimeout도 콜백 함수를 비동기로 예약한다.

                두 setTimeout의 지연 시간이 모두 0ms이고,
                '2'를 출력하는 setTimeout이 먼저 예약되었으므로
                일반적으로 '2' 다음에 '3'이 출력된다.
            */
            setTimeout(function(){
                console.log('3')
            }, 0)


            /*
                이 코드는 setTimeout 바깥에 있는 동기 코드다.

                따라서 예약된 '2', '3'보다 먼저 실행된다.
            */
            console.log('마지막')
        }


        // fn3이라는 이름의 함수를 선언한다.
        function fn3(){
            // fn3이 호출될 때마다 한 번씩 출력된다.
            console.log('fn3 실행')
        }


        /*
            프로그램에서 처음 직접 호출하는 함수이다.

            호출 흐름:
            fn1()
              → fn2()
                  → fn3()
                  → fn3()
                  → setTimeout 콜백 2개 예약
              → fn2 종료
            → fn1 종료
            → 모든 동기 코드 종료
            → 예약된 setTimeout 콜백 실행
        */
        fn1()


        /*
            이 줄의 주석을 해제하면 fn1 실행이 완전히 끝난 뒤
            fn2가 한 번 더 실행된다.

            fn2 내부의 setTimeout 콜백도 추가로 예약되므로
            출력 횟수와 순서가 달라진다.
        */
        // fn2()


        /*
            [호출 스택과 이벤트 루프를 간단히 정리]

            1. fn1()이 호출 스택에 들어간다.
            2. fn1 안에서 fn2()가 호출 스택에 들어간다.
            3. fn2 안에서 fn3()가 들어갔다가 실행 후 빠진다.
            4. 두 번째 fn3()도 들어갔다가 빠진다.
            5. setTimeout 콜백들은 바로 실행되지 않고 대기한다.
            6. fn2가 끝나고 호출 스택에서 빠진다.
            7. fn1도 끝나고 호출 스택에서 빠진다.
            8. 호출 스택이 비면 대기 중인 콜백이 순서대로 실행된다.

            즉, setTimeout(..., 0)은
            "지금 즉시 실행"이 아니라
            "현재 동기 작업이 끝나는 대로 실행해 달라"에 가깝다.
        */
    </script>
</head>
<body>

</body>
</html>
