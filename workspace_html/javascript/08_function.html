        function plus2(x, y){
            console.log('x : ', x)
            console.log('y : ', y)
            if(y == undefined){
                console.log(`y값 입력 못받음`)
                // y = 0
            }

            const z = x + y
            return z
        }

        let a = plus2(2)

        // 전달인자의 값이 undefined일 때 기본 값 지정
        // 전달 받은 값이 있으면 사용하고 없으면 기본값 사용
        function plus3(x, y = 0){
            console.log('x : ', x)
            console.log('y : ', y)
            if(y == undefined){
                console.log(`y값 입력 못받음`)
                y = 0
            }

            const z = x + y
            return z
        }
        // 전달인자를 적게 줘도 에러 없음
        a = plus3(2)
        console.log(a)
        
        // 전달인자를 많이 줘도 에러 없음
        // 받을 만큼만 가져감

        let yahoo = function(){

        }
        // setTimeout(함수, 지연시간ms == 1/1000초)

        // 예약 취소
