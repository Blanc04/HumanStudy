<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>function</title>

    <script>
        // ============================================================
        // 1. 함수의 선언과 호출
        // ============================================================

        // hello라는 이름의 함수를 선언한다.
        // 함수 선언만으로는 함수 내부 코드가 실행되지 않는다.
        function hello() {
            // hello 함수가 호출되면 콘솔에 문자열을 출력한다.
            console.log('hello world')
        }

        // 함수 이름 뒤에 소괄호 ()를 붙이면 함수를 호출한다.
        hello()


        // ============================================================
        // 2. 매개변수를 사용하는 함수
        // ============================================================

        // width와 height는 함수가 전달받을 값을 저장하는 매개변수다.
        // 이 함수는 계산 결과를 함수 내부에서 바로 출력한다.
        function getArea(width, height){
            // 템플릿 리터럴을 사용해 전달받은 너비와 높이를 출력한다.
            console.log(`width: ${width}, height: ${height}`)

            // 너비와 높이를 곱한 값을 지역 변수 area에 저장한다.
            let area = width * height

            // 계산한 면적을 콘솔에 출력한다.
            console.log('면적 : ', area)
        }

        // 10과 20은 함수에 전달하는 전달인자(argument)다.
        // 호출되면 width에는 10, height에는 20이 들어간다.
        getArea(10, 20)


        // ============================================================
        // 3. return으로 계산 결과 돌려주기
        // ============================================================

        // getArea2는 결과를 직접 출력하지 않고 return으로 반환한다.
        function getArea2(width, height){
            // 전달받은 값을 확인한다.
            console.log(`width: ${width}, height: ${height}`)

            // 면적을 계산한다.
            let area = width * height

            // area의 값을 함수가 호출된 자리로 돌려준다.
            // return이 실행되면 함수 실행도 즉시 종료된다.
            return area
        }

        // getArea2(10, 20)의 반환값 200이 result에 저장된다.
        let result = getArea2(10, 20)

        // result에 저장된 200을 출력한다.
        console.log(result)


        // ============================================================
        // 4. 덧셈 함수와 곱셈 함수
        // ============================================================

        // x와 y를 더해서 반환하는 함수다.
        function plus(x, y){
            // 전달받은 x의 값을 확인한다.
            console.log('x : ', x)

            // 전달받은 y의 값을 확인한다.
            console.log('y : ', y)

            // x + y의 결과를 상수 z에 저장한다.
            const z = x + y

            // 계산 결과를 함수 밖으로 반환한다.
            return z
        }

        // 아래 코드의 주석을 해제하면 plus(2, 3)의 결과 5가 result에 저장된다.
        // result = plus(2, 3)
        // console.log(result)


        // x와 y를 곱해서 반환하는 함수다.
        function product(x, y){
            // 전달받은 x의 값을 확인한다.
            console.log('x : ', x)

            // 전달받은 y의 값을 확인한다.
            console.log('y : ', y)

            // x * y의 결과를 상수 z에 저장한다.
            const z = x * y

            // 곱셈 결과를 함수 밖으로 반환한다.
            return z
        }

        // 함수 호출은 안쪽부터 실행된다.
        // 1) product(8, 7) 실행 → 56 반환
        // 2) plus(2, 56) 실행 → 58 반환
        // 3) 최종 반환값 58을 result에 저장
        result = plus(2, product(8, 7))

        // 최종 결과 58을 출력한다.
        console.log(result)

        // plus(2, 3)의 반환값 5를 전역 영역의 상수 z에 저장한다.
        // 함수 plus 내부의 const z와 이름은 같지만 서로 다른 영역의 변수다.
        const z = plus(2, 3)


        // ============================================================
        // 5. 블록 스코프(변수를 사용할 수 있는 범위)
        // ============================================================

        // 중괄호 {}만 따로 사용해도 하나의 블록이 만들어진다.
        {
            // const와 let은 선언된 블록 안에서만 사용할 수 있다.
            const a = 10

            // 같은 블록 안에서 같은 이름으로 const를 다시 선언하면 오류가 발생한다.
            // const a = 10

            // 안쪽에 새로운 중첩 블록을 만든다.
            {
                // 안쪽 블록에서는 바깥 블록의 변수 a를 사용할 수 있다.
                console.log('a', a)

                // b는 현재 안쪽 블록에서만 사용할 수 있다.
                const b = 20
                console.log('b', b)
            }

            // b는 안쪽 블록에서 선언되었으므로 여기서는 사용할 수 없다.
            // 주석을 해제하면 ReferenceError가 발생한다.
            // console.log(b)
        }


        // ============================================================
        // 6. for문의 블록 스코프
        // ============================================================

        // let i는 for문 블록 안에서만 사용할 수 있다.
        for(let i = 0; i < 5; i++){
            // a는 반복할 때마다 현재 반복 블록 안에 새로 만들어진다.
            let a = 10
        }

        // 바깥 for문의 i와 안쪽 블록의 i는 서로 다른 변수다.
        for(let i = 0; i < 5; i++){
            // 현재 블록 안에서 새로운 i를 선언해 바깥 i를 가린다(shadowing).
            // 이 i는 항상 10이며, for문의 증감에 사용되는 바깥 i와는 다르다.
            let i = 10
        }


        // ============================================================
        // 7. 전달인자가 부족한 경우
        // ============================================================

        // x와 y를 더하는 함수다.
        function plus2(x, y){
            console.log('x : ', x)
            console.log('y : ', y)

            // 전달받지 못한 매개변수의 값은 undefined가 된다.
            if(y == undefined){
                console.log('y값 입력 못 받음')

                // 이 줄의 주석을 해제하면 y를 0으로 바꿀 수 있다.
                // 현재는 주석 상태이므로 y는 계속 undefined다.
                // y = 0
            }

            // 숫자 2 + undefined의 결과는 NaN(Not a Number)이다.
            const z = x + y
            return z
        }

        // x에는 2가 들어가지만 y는 전달하지 않았으므로 undefined가 된다.
        // 따라서 반환값은 NaN이다.
        let a = plus2(2)
        console.log(a)


        // ============================================================
        // 8. 기본 매개변수
        // ============================================================

        // y = 0은 y에 값이 전달되지 않았거나 undefined가 전달됐을 때 사용할 기본값이다.
        function plus3(x, y = 0){
            console.log('x : ', x)
            console.log('y : ', y)

            // 기본 매개변수 때문에 y는 이미 0으로 바뀐 상태다.
            // 따라서 plus3(2)처럼 호출하면 이 조건은 거짓이 된다.
            if(y == undefined){
                console.log('y값 입력 못받음')
                y = 0
            }

            // x와 y를 더한 값을 반환한다.
            const z = x + y
            return z
        }

        // 전달인자를 적게 주더라도 문법 오류는 발생하지 않는다.
        // y에는 기본값 0이 들어가므로 결과는 2다.
        a = plus3(2)
        console.log(a)

        // 전달인자를 매개변수보다 많이 주더라도 문법 오류는 발생하지 않는다.
        // x에는 2, y에는 3이 들어가며 세 번째 값 4는 사용되지 않는다.
        a = plus3(2, 3, 4)

        // 결과는 5다. 확인하려면 아래 주석을 해제한다.
        // console.log(a)


        // ============================================================
        // 9. 익명 함수와 함수 표현식
        // ============================================================

        // 이름이 없는 익명 함수를 만들어 변수 noName에 저장한다.
        // 이런 형태를 함수 표현식이라고 한다.
        let noName = function (){
            console.log('익명 함수')
        }

        // 위 함수 표현식은 아래 함수 선언문과 사용 모습은 비슷하지만
        // 생성 시점과 호이스팅 동작에는 차이가 있다.
        // function noName(){
        //     console.log('익명 함수')
        // }

        // noName 변수에 저장된 함수를 호출한다.
        noName()

        // 함수도 하나의 값이므로 다른 변수에 그대로 저장할 수 있다.
        // 여기서는 함수를 실행한 결과가 아니라 함수 자체를 복사한다.
        let noName2 = noName

        // noName2도 같은 함수를 가리키므로 호출할 수 있다.
        noName2()


        // ============================================================
        // 10. 함수를 다른 함수의 전달인자로 넘기기
        // ============================================================

        // fn이라는 매개변수로 어떤 값을 전달받는 함수다.
        function test(fn){
            console.log('test 실행중')

            // 전달받은 값의 자료형을 출력한다.
            console.log(typeof fn)

            // 전달받은 값이 함수일 때만 호출한다.
            if(typeof fn == 'function'){
                fn()
            }
        }

        // noName()이라고 쓰지 않았으므로 함수를 즉시 실행하지 않는다.
        // noName 함수 자체가 test의 fn 매개변수로 전달된다.
        test(noName)


        // ============================================================
        // 11. 같은 이름의 함수 선언
        // ============================================================

        // 첫 번째 print 함수 선언이다.
        function print(){
            console.log('print 실행')
        }

        // 같은 스코프에서 같은 이름으로 함수를 다시 선언했다.
        // 함수 선언문은 호이스팅되며, 뒤의 선언이 앞의 선언을 덮어쓴다.
        function print(){
            console.log('2번째 print 실행')
        }

        // 따라서 두 번째 print 함수가 실행된다.
        print()

        // 함수를 호출하지 않고 함수 자체를 콘솔에 출력한다.
        console.log(print)

        // print 함수 자체를 변수 p에 저장한다.
        let p = print

        // p가 가리키는 print 함수를 호출한다.
        p()


        // ============================================================
        // 12. 객체와 객체의 메서드도 변수에 저장할 수 있다
        // ============================================================

        // console 객체 자체를 변수 c에 저장한다.
        let c = console

        // c도 console 객체를 가리키므로 log 메서드를 사용할 수 있다.
        c.log(666)

        // console.log 함수 자체를 변수 cl에 저장한다.
        let cl = console.log

        // cl을 호출하면 console.log처럼 동작한다.
        cl(166)


        // ============================================================
        // 13. 함수의 반환값 전달과 함수 자체 전달의 차이
        // ============================================================

        // 호출되면 'test1'을 출력하고 숫자 3을 반환한다.
        function test1(){
            console.log('test1')
            return 3
        }

        // 전달받은 값을 출력하는 함수다.
        function test2(a){
            console.log('test2')
            console.log(a)
        }

        // test1()처럼 소괄호가 있으므로 test1을 먼저 실행한다.
        // test1의 반환값 3이 test2에 전달된다.
        test2(test1())

        // 위 코드를 순서대로 풀어 쓰면 아래와 같다.
        // 주의: x를 let/const 없이 대입하면 비엄격 모드에서는 전역 변수가 된다.
        // 엄격 모드('use strict')에서는 ReferenceError가 발생한다.
        x = test1()
        test2(x)

        // 이번에는 test1()이 아니라 test1이므로 함수가 실행되지 않는다.
        // test1 함수 자체가 test2의 매개변수 a에 전달된다.
        // 따라서 test2 내부의 console.log(a)는 함수 내용을 출력한다.
        test2(test1)

        // 중요: 아래 코드는 바로 위의 test2(test1)과 같은 코드가 아니다.
        // test1()을 실제로 호출해 반환값 3을 test2에 전달한다.
        x = test1()
        test2(x)

        // test2(test1)과 같은 동작으로 풀어 쓰려면 아래처럼 해야 한다.
        // let x2 = test1
        // test2(x2)


        // ============================================================
        // 14. setTimeout: 일정 시간이 지난 뒤 한 번 실행
        // ============================================================

        // '야호'를 출력하는 익명 함수를 yahoo 변수에 저장한다.
        let yahoo = function(){
            console.log('야호')
        }

        // setTimeout(실행할 함수, 지연 시간)
        // 지연 시간의 단위는 ms(밀리초)이며 1000ms는 1초다.
        // yahoo()가 아니라 yahoo를 전달해야 지금 실행하지 않고 예약할 수 있다.
        setTimeout(yahoo, 3000)

        // 함수를 별도 변수에 저장하지 않고 setTimeout 안에 직접 작성할 수도 있다.
        // 아래 익명 함수는 약 4초 뒤 한 번 실행된다.
        setTimeout(
            function(){
                console.log('야호')
            },
            4000
        )

        // setTimeout의 반환값은 예약을 구분하는 타이머 ID다.
        let idx = setTimeout(
            function(){
                console.log('야호!!!!!!!!!!!!!!')
            },
            1000
        )

        // 예약 번호를 출력한다.
        console.log(idx)

        // 타이머 ID를 clearTimeout에 전달하면 예약된 실행을 취소한다.
        // 따라서 위의 '야호!!!!!!!!!!!!!!'은 출력되지 않는다.
        clearTimeout(idx)


        // ============================================================
        // 15. 콜백 함수
        // ============================================================

        // cb는 나중에 호출하기 위해 전달받는 콜백 함수다.
        function rc(cb){
            // 전달받은 콜백 함수를 즉시 한 번 실행한다.
            cb()

            // 같은 콜백 함수를 약 1초 뒤 한 번 더 실행하도록 예약한다.
            setTimeout(
                cb,
                1000
            )
        }


        // ============================================================
        // 16. 재귀 호출과 setTimeout 사용 시 주의점
        // ============================================================

        function 기계_1초_후_한_번_더(함수){
            // 전달받은 함수를 즉시 실행한다.
            함수()

            // 매우 중요:
            // 아래 코드는 함수를 setTimeout에 넘기는 것이 아니라
            // 기계_1초_후_한_번_더(함수)를 즉시 다시 호출한다.
            // 이 함수를 실제로 호출하면 1초를 기다리지 않고 재귀 호출이 계속되어
            // 최대 호출 스택 초과(RangeError)가 발생할 수 있다.
            setTimeout(
                기계_1초_후_한_번_더(함수),
                1000
            )
        }

        // 의도대로 1초 뒤 재귀 호출하려면 함수로 감싸서 전달해야 한다.
        // 현재 예제의 실행 결과를 바꾸지 않기 위해 수정 코드는 주석으로만 남긴다.
        // function 기계_1초_후_한_번_더_수정본(함수){
        //     함수()
        //     setTimeout(function(){
        //         기계_1초_후_한_번_더_수정본(함수)
        //     }, 1000)
        // }


        // ============================================================
        // 17. setInterval: 일정 시간마다 반복 실행
        // ============================================================

        // setInterval은 지정한 시간 간격마다 함수를 반복 실행한다.
        // 1000 * 2는 2000ms, 즉 2초다.
        let idx2 = setInterval(function(){
            console.log('인터발')
        }, 1000 * 2)

        // 아래 코드의 주석을 바로 해제하면 반복 실행을 즉시 취소한다.
        // clearInterval(idx2)

        // setInterval이 반환한 타이머 ID를 출력한다.
        console.log(idx2)

        // 약 10초 뒤 실행될 함수를 예약한다.
        setTimeout(function(){
            // idx2에 해당하는 반복 실행을 중지한다.
            clearInterval(idx2)
        }, 1000 * 10)
    </script>
</head>
<body>

</body>
</html>
