<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width='device-width', initial-scale=1.0">
    <title>Document</title>
    <style>
        #game {
            width: 250px;
            position: absolute;
            top: 0;
            left: 0;
            transition: left 0.1s linear;
        }
    </style>
    <script>
        const keyState = {
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false
        }
        function load(){
            control()
            move()
        }
        function control(){
            document.addEventListener('keydown', function(event){
                if(event.key in keyState){
                    keyState[event.key] = true
                }
            })
            document.addEventListener('keyup', function(event){
                if(event.key in keyState){
                    keyState[event.key] = false
                }
            })
        }
        function move(){
            const game = document.querySelector('#game')
            let currentTop = parseInt(getComputedStyle(game).top)
            let currentLeft = parseInt(getComputedStyle(game).left)
            
            if(keyState.ArrowUp){
                currentTop -= 5
            }
            if(keyState.ArrowDown){
                currentTop += 5
            }
            if(keyState.ArrowLeft){
                currentLeft -= 20
            }
            if(keyState.ArrowRight){
                currentLeft += 20
            }
            game.style.top = currentTop + 'px'
            game.style.left = currentLeft + 'px'

            requestAnimationFrame(move)
        }

        //             game.style.left = (currentLeft + 15) + 'px'
        //         }
        //     })

    </script>
</head>
