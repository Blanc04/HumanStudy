<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>var</title>
    <script>
        // 한 줄 주석
        /* 
            여러 줄 주석
            범위 주석
        */
        console.log("hello world")
        // alert("hello\nworld")
        // confirm("hello world2")
        // prompt("hello world3")

        a = 15;
        console.log(a);
        console.log(11);

        // 변수 선언
        // 방법 1
        var a = 10;
        console.log('a : '+ a);
        
        var b = 20;
        console.log('b :', b);
        
        a = 30;
        console.log('a : '+ a);
        
        // 같은 변수명으로 다시 선언해도 오류 없음
        var a = 40;
        console.log('a : '+ a);
        
        // 선언 방법 2
        // 타입 없음
        c = 50;
        console.log('c : '+ c);
        
        // 선언 방법 3
        let d = 60
        console.log('d : '+ d)
        
        // 같은 변수 명으로 다시 선언하는 것을 막아줌
        // let d = 70;
        d = 65
        console.log('d : '+ d)
        
        // 선언 방법 4
        const e = 70
        console.log('e : '+ e)
        // const e = 80
        // e = 75
        
        d = '문자'
        console.log('d : '+ d)
        
        // const는 선언과 동시에 값을 넣어야 함
        // const f;
        // f = 80
        // console.log('f : '+ f)

        // camel case
        let salesCount = 1;
        // snake case
        let sales_count = 1;
        // kebab case
        // let font-size = 2;

        // not defined
        // console.log(z)
        let y;
        console.log(y)

        console.log( 7 / 0 )

        // NaN : Not a Number
        console.log( 7 * '문자' )

        console.log(`백틱
        엔터 가능
        ${a}
        `)
        console.log("a :"+ a)
        console.log(`a : ${a}`)

        let f = true;
        let g = false;

        let strA = '26.1'
        let strB = '10개'
        console.log( strA + .2 )

        let numA = Number(strA) + .1
        console.log(numA)

        // 대상 안에 문자가 있으면 숫자 변환 실패
        console.log( Number(strB) )
        
        numA = parseInt( strA )
        console.log('numA :', numA)
        console.log( parseInt(strB) )

        console.log( String(numA) )
        console.log( ''+numA )

        // '' 또는 ""가 없으므로 숫자 판정
        let py = 3.3
        let acre = 4046.8
        let 밭 = 10

        console.log( '단위가 평일 때 : '+밭 * py )
        console.log( '단위가 에이커일 때 : '+밭 * acre )
        // console.log( 밭 * acre + '단위가 에이커일 때 : ' )
        console.log( 82 / py )

        let 잔고 = 15000
        let 번돈 = 100000

        console.log(7 / 3)
        console.log( '나머지 : ', 7 % 3)
        console.log( '몫 : ', parseInt(7 / 3) )

        // 9명이 회식
        console.log( '인당 : ', parseInt(100000 / 9))
        console.log( '주최자가 조금 더 낼 때 : ', parseInt(100000 / 9) + (100000 % 9))

        let h = confirm('fuck')
        console.log('confitm 결과 : ', h)

        let i = prompt('비번을 입력하세요')
        console.log('prompt 결과 : ', i)
        console.log(`prompt 결과 : . ${i}입니다`)

        console.error('WHAT')
    </script>
</head>
