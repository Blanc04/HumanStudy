<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>array</title>
    <script>
        /*
            배열 array

            한 번에 여러 변수를 만드는 기술
            각 변수는 index로 구분
            index는 0번부터 시작
        */

        // 배열 선언 방법 1
        const arr1 = []
        console.log(typeof arr1)

        // 배열 선언 방법 2
        const arr2 = new Array()

        const arr3 = [1, 2, 'fuxk', false, arr1]
        const arr4 = new Array(1, 2, 'fuxk', false, arr1)

        arr3[1] = 7

        console.log('arr3 :', arr3)
        console.log('arr3[0] :', arr3[0])
        console.log('arr3[1] :', arr3[1])

        let arr = [1,2,3,4,5]
        console.log(arr[5]) // undefined

        arr[5] = 5
        console.log(arr[5])
        console.log(arr)

        arr['문자'] = '문자'
        console.log(arr['문자'])
        console.log(arr)

        arr = [0,1,2,3,4,5]
        for(let i=0; i<6; i++){
            console.log(arr[i])
        }
        // 배열의 길이
        console.log('arr.length :', arr.length)
        for(let i=0; i<arr.length; i++){
            console.log(arr[i])
        }

        const 양식 = ['파스타', '피자', '스테이크', '돈까스', '피시앤칩스']
        const 중식 = ['짜장', '짬뽕', '탕수육', '난자완스', '깐풍기', '꽂빵', '칠리새우']
        const 일식 = ['라멘', '슈토', '오차즈케', '후토마키', '스키야끼']

        const 음식 = [ 양식, 중식, 일식]

        console.log( '음식.length : ', 음식.length)
        console.log( '선 긋기')
        
        let y = 음식[0]
        let p = y[0]
        let pasta = 음식[0][0]
        let steak = 음식[0][2]
        let fac = 음식[0][4]

        console.log(음식[0].length)
        console.log('선 긋기')
        
        
        // 문제
        // 모든 먹거리를 출력


        for(let menu=0; menu<음식[0].length; menu++){
            console.log(음식[0][menu])
        }

        for(let ftype=0; ftype<음식.length; ftype++){
            for(let menu=0; menu<음식[ftype].length; menu++){
            console.log(음식[ftype][menu])
            }
        }

        // 배열의 메소드(함수)
        arr = [1,2,3,4]
        
        // 맨 마지막에 하나 추가
        arr.push(5)
        console.log(arr)
        
        //맨 앞에 추가하기 
        arr.unshift(0)
        console.log(arr)
        
        // 맨 마지막거 하나 삭제
        // 뺀 값은 돌려줌
        // arr.pop()
        let pop = arr.pop()
        console.log(arr)
        console.log(pop)
        
        // 맨 처음 것 빼서 돌려주기
        let shift = arr.shift()
        console.log(arr)
        console.log(shift)

        // 배열 뒤집기
        const reverse = arr.reverse()
        console.log(arr)
        console.log(reverse)
        

        // 오름차순 정렬
        arr = [4,2,7,5,9,1,8,3,6]
        const sort = arr.sort()
        console.log(arr)
        console.log(sort)
        
        // chaining 체이닝 체인방식 체인
        arr.sort().reverse()
        console.log(sort)

        arr = [0,1,2,3,4,5,6]
        let a = arr.slice(2, 5)
        console.log(arr)
        console.log(a)
        a = arr.slice(2, 50)
        console.log(a)

        a = arr.slice(2)
        console.log(a)

        let hour = 12
        hour = '0'+12
        // 전달인자가 음수면 뒤에서부터 index
        hour = hour.slice(-2)
        console.log(hour)

        // 해당 값의 index를 돌려준다
        let b = arr.indexOf(4)
        console.log(b)
        let c = 'd16udonne04@gmail.com'
        b = c.indexOf('@')
        console.log(b)
        c.slice(0, b)
        console.log(c.slice(0, b))

        // 없으면 -1
        b = c.indexOf('kkk')
        console.log(b)
        
        arr = [10, 5, 3]
        console.log(arr.sort())
        
        // 배열을 문자로 만듬
        // 구분하는 문자를 넣을 수 있고
        // 없으면 기본값 ,
        arr = ['a', 'b', 'c']
        b = arr.join()
        console.log(b)
        console.log('선 긋기')
        console.log(arr)
        console.log('선 긋기')
        console.log(''+arr)
        b = arr.join(';')
        console.log(b)
        
        let d = b.split(';')
        console.log(d)
        console.log('선 긋기')
        
        // 네이버 검색 결과의 쿼리스트링에서
        // name이 query인 것의 값을 출력
        // https://search.naver.com/search.naver?where=nexearch&sm=top_hty&fbm=0&ie=utf8&query=1234&ackey=dg2dalke
        // 답=1234
        const url = 'https://search.naver.com/search.naver?where=nexearch&sm=top_hty&fbm=0&ie=utf8&query=1234&ackey=dg2dalke'
        let temp = url.split('?')
        console.log(temp)
        let qs = temp[1]
        qs = qs.split('&')
        console.log(qs)
        for(let i=0; i<qs.length; i++){
            let q = qs[i].split('=')
            let name = q[0]
            let value = q[1]
            if(name == 'query'){
                console.log(value)
            }
        }

        // 문제 1
        // 10개의 각 변수에 1~10까지 담기
        const num1start10end = []
        // num1start10end.push(1, 2, 3)
        // console.log(num1start10end)
        for(let j=1;j<11;j++){
            num1start10end.push(j)
        }
        console.log(num1start10end)

        // 문제2
        // [3, 4, 7, 5, 1, 6]
        const q2 = [3, 4, 7, 5, 1, 6]
        // 문제 2-1
        // 홀수의 개수 구하기
        let q2num = 0
        for(let i=0;i<q2.length;i++){
            if(q2[i]%2){
                q2num ++
                console.log(q2[i])
            }
        }
        console.log(q2num)
        // 문제 2-2
        // 4보다 큰 수의 개수 구하기

    </script>
