<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex</title>
    <style>
        .container {
            border: 1px solid greenyellow;
            width: 300px;
            height: 300px;
            margin: 0 auto;
            
            display: flex;
            /* display: inline-flex; */
            
            /* main 축의 기본값 : 왼쪽에서 오른쪽으로 */
            flex-direction: row;
            
            /* 오른쪽에서 왼쪽으로 */
            /* flex-direction: row-reverse; */
            
            /* 위에서 아래로 */
            /* flex-direction: column; */
            
            /* 아래에서 위로 */
            /* flex-direction: column-reverse; */

            /* 기본값, 한 줄에 모든 item을 표시하려고 노력함 */
            /* flex-wrap: nowrap; */

            /* 넘치는 경우 다음 줄로 (inline-block 처럼) */
            /* cross축 start에서 end */
            /* flex-wrap: wrap; */

            /* cross의 end에서 start로 */
            /* flex-wrap: wrap-reverse; */

            /* 기본값, main 축의 start 방향 정렬 */
            /* justify-content: flex-start; */
            
            /* main 축의 end 방향 정렬 */
            /* justify-content: flex-end; */
            
            /* main 축의 가운데 정렬 */
            /* justify-content: center; */

            /* 남은 공간을 사이사이에 균등하게 배치 */
            /* justify-content: space-between; */

            /* item의 양쪽에 동일한 공간 배치 */
            /* justify-content: space-around; */

            /* 모든 공간을 균등하게 배치 */
            /* justify-content: space-evenly; */

            /* 한 줄에 대한 cross축의 이야기 */

            /* 기본값, cross축으로 쭉 늘리기  */
            /* align-items: stretch; */

            /* cross축의 start 방향 */
            /* align-items: flex-start; */
            
            /* cross축의 end 방향 */
            /* align-items: flex-end; */

            /* cross축의 중앙 정렬 */
            /* align-items: center; */

            /* 여러 줄에 대한 cross축의 이야기 */
            /* flex-wrap: wrap; */

            /* 기본값, 각 줄의 높이를 꽉 채운 상태 */
            /* align-content: stretch; */

            /* cross축 기준 start, end, 중앙 */
            /* align-content: flex-start; */
            /* align-content: flex-end; */
            /* align-content: center; */
            /* align-content: space-between; */
            /* align-content: space-around; */
            /* align-content: space-evenly; */
        }
        .container .item {
            border: 1px solid salmon;
            background-color: aquamarine;
            width: 100px;
            /* margin: 0 auto; */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">1</div>
        <div class="item" style="order: 1;">2</div>
        <div class="item" style="order: -1;">3</div>
        <div class="item" style="flex-grow: 1.5; flex-shrink: 3;">4</div>
        <div class="item" style="flex-grow: 2.5; flex-shrink: 2;">5</div>
    </div>
</body>
</html>
