<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transform</title>
    <style>
        .box {
            border: 1px solid salmon;
            width: 100px;
            height: 100px;
            background-color: aquamarine;
            margin: 25px 50%;
            text-align: center;
            transition: all .5s;
        }
        .translate:hover {
            transform: translate(50%, 0);
        }
        .scale:hover {
            transform: scaleX(1.25);
        }
        .rotate:hover {
            transform: rotate(360deg);
        }
        .total:hover {
            transform: translate(0, 50%) scale(1.25) rotate(360deg);
        }
        .parent{
            border: 2px solid salmon;
            width: 40%;
            height: 40vh;
            
            position: relative;
        }
        .parent .child {
            border: 1px solid aquamarine;
            width: 30%;
            height: 30%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="box">change</div>
    <div class="box translate">translate</div>
    <div class="box scale">scale</div>
    <div class="box rotate">rotate</div>
    <div class="box total">total</div>
    <hr>
    <div class="parent">
        <div class="child">

        </div>
    </div>
</body>
</html>
