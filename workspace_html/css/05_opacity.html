<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>opacity</title>
    <style>
        .hidden {
            visibility: hidden;
        }
        .none {
            display: none;
        }
        .opacity {
            opacity: 0.25;
        }
    </style>
</head>
<body>
    <p>첫 번째</p>
    <p class="hidden">두 번째</p>
    <p class="none">세 번째</p>
    <p class="opacity">네 번째</p>
    <p>다섯 번째</p>
</body>
</html>
