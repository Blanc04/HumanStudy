<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>selector</title>
    <style>
        /* CSS 주석 */
        /* 
           여러 줄
           주석
        */

        /* 전체 선택자 */
        * {
            color: rgb(255, 8, 0);
        }
        /* 태그 선택자 */
        h1 {
            font-size: 250%
        }
        h2 {
            font-size: 250%
        }
        /* ,로 구분해서 여러 개 동시 적용 가능 */
        h1, h2 {
            font-size: 250%
        }

        /* id 선택자 */
        #li1 {
            color: black;
        }

        .c1 {
            background-color: green;
        }

        .bigtext {
            font-size: 30px;
        }
        
        /* 속성 선택자 */
        /* 속성이 존재한다면 */
        [readonly] {
            background-color: yellow;
        }

        /* 속성이 있고 값도 일치하면 */
        [type=password] {
            background-color: aquamarine;
        }
        
        /* #li3은 [id=li3]의 줄임말 */
        [id=li3] {
            border: 3px solid red;
        }

        /* href 속성의 값이 https로 시작하는 것 */
        [href^=https] {
            color: purple;
        }

        /* href 속성의 값이 com으로 끝나는 것 */
        [href$=com] {
            font-size: 35px;
        }
        
        /* ~= 띄어쓰기로 구분되는 값 */
        /*.bigtext는 [class~=bigtext] */
        [class~=bigtext] {
            color: #0000ff;
        }

        /* 딱 붙여서 쓰면 "그리고" 조건 붙음 */
        h2.c1 {
            color: rgb(200, 25, 150)
        }

        li.c1.c2 {
            background-color: yellow;
        } 

        /* 자손 선택자 */
        div strong {
            color: blue;
        }

        /* 자식 선택자 */
        div > strong {
            font-size:40px
        }

        /* 마우스 올라갔을 때 */
        #div1:hover {
            background-color: yellow;
        }

        /* 마우스 클릭할 때 */
        #div1:active {
            background-color: green;
        }

        /* 요소가 선택 됐을 때 */
        .text1:focus {
            background-color: yellow;
        }

        /* checkbox, radio가 선택된 상태일 때 */
        [type=checkbox]:checked {
            width: 20px;
            height: 20px;
        }

        /* + : 바로 다음 형제일 때 */
        /* [type=checkbox] + span {
            text-decoration: line-through;
        } */
        
        [type=checkbox]+checked + span {
            text-decoration: line-through;
        }

        /* N번째 요소 */
        #ul1 > li:nth-child(4) {
            color: black;
        }

        /* 홀수 번째 */
        #ul1 > li:nth-child(2n+1) {
            background-color: gray;
        }

        /* not안의 선택자를 제외 */
        #ul1 li:not(.c3) {
            font-size: 32px;
        }

        /* 선택자 앞 또는 뒤에 content 추가 및 css 적용 */
        h3::before {
            content: "BEFORE";
            color: brown;
        }

        h3::after {
            content: "AFTER";
            color: aqua;
            font-size: 16px;
        }

        ::selection {
            background-color: aqua;
        }
        /*
            우선 순위
            !important > style 속성 > #id > class = 속성 > 태그 > * 전체 선택자 > 브라우저 기본값
            
            동등한 우선 순위일 때
            나중에 나온 것이 덮어 씀
        */
        div {
            border: 1px solid red;
        }

        [human] {
            border: 1px solid pink;
        }

        .c4 {
            border: 1px solid blue !important;
        }

        #div2 {
            border: 1px solid aqua;
        }

        #table .no {
            background-color: black;
        }

        #table [id^=title_] {
            border: 1px solid red;
        }

    </style>
</head>
<body>
    <h1>hello world</h1>
    <h2 class="c1">subtitle</h2>
    <hr>
    <ul>
        <li id="li1" class="c1">li=1</li>
        <li class="c1 bigtext c2">li=2</li>
        <li id="li3">li=3</li>
    </ul>

    <input type="text" readonly><br>
    <input type="password"><br>
    <a href="http://naver.com">http</a><br>
    <a href="https://daum.net">https</a><br>
    
    <strong>밖에 있는 strong</strong>
    <div>
        <strong>div 안에 있는 strong</strong>
    </div>
    <div>
        <a href="#">
        <strong>div 안의 a 안에 있는 strong</strong>
        </a>
    </div>
    <hr>
    <div id="div1">
        hover 연습
    </div>
    focus 연습 : <input type="text" class="text1">
    <br>
    <input type="checkbox">
    checked 연습
    <br>
    <input type="checkbox"><span>점심먹기</span>
    <br>
    <ul id="ul1">
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li class="c3">4</li>
        <li class="c3">5</li>
    </ul>
    <br>

    <h3>before after 연습</h3>

    <div class="c4" id="div2" human="천안" style="border: 1px solid black">
        우선 순위 연습
    </div>
    <hr>
    <table id="table" border="1">
        <tr>
            <td class="no">No</td>
            <td id="title_0">제목</td>
            <td>글쓴이</td>
        </tr>
        <tr>
            <td class="no">1</td>
            <td id="title_1">제목 1</td>
            <td>글쓴이 1</td>
        </tr>
        <tr>
            <td class="no">2</td>
            <td id="title_2">제목 2</td>
            <td>글쓴이 2</td>
        </tr>
    </table>

    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
</body>
</html>
