<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transition</title>
    <style>
        .box {
            border: 1px solid salmon;
            width: 100px;
            height: 100px;
            background: salmon;
            margin: 10px;
            /* transition: all 5s; */
            text-align: center;
        }
        .box1:hover {
            background-color: aquamarine;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            box-shadow: 2px 2px 10px gray;
        }
        .box2:hover {
            background-color: aquamarine;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            box-shadow: 2px 2px 10px gray;
            transition: all 5s;
        }
    </style>
</head>
<body>
    <div class="box box1">Change</div>
    <div class="box box2">Change</div>
</body>
</html>
